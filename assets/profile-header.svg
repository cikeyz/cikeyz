<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Carl Kristian Ortiz profile header</title>
  <desc id="desc">A structured engineering-themed banner for GitHub profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.42" stop-color="#193A3A"/>
      <stop offset="1" stop-color="#4B2637"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4F0E8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#F4F0E8" stop-opacity="0.04"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#F4F0E8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <path d="M0 275C155 242 222 310 365 280C508 250 539 162 684 153C829 144 910 226 1050 183C1124 160 1160 125 1200 103V360H0V275Z" fill="#00A896" fill-opacity="0.18"/>
  <path d="M0 302C122 277 240 315 372 297C515 278 576 220 713 226C850 232 964 300 1200 238V360H0V302Z" fill="#F2C14E" fill-opacity="0.18"/>

  <g filter="url(#shadow)">
    <rect x="70" y="58" width="470" height="244" rx="18" fill="url(#panel)" stroke="#F4F0E8" stroke-opacity="0.18"/>
    <rect x="660" y="64" width="390" height="214" rx="18" fill="url(#panel)" stroke="#F4F0E8" stroke-opacity="0.16"/>
  </g>

  <text x="98" y="123" fill="#F4F0E8" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="0">Carl Kristian Ortiz</text>
  <text x="98" y="171" fill="#F4F0E8" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="0">builds systems</text>
  <text x="98" y="215" fill="#D9E2DD" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500" letter-spacing="0">software • embedded • docs • infra</text>
  <text x="98" y="252" fill="#B8C7C0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" letter-spacing="0">Computer Engineering student in Manila working across product, hardware, and evidence-driven documentation.</text>

  <g transform="translate(710 102)" stroke="#F4F0E8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 20h210v118H40z" fill="none" opacity="0.9"/>
    <path d="M76 58h56M76 88h92M76 118h44" opacity="0.72"/>
    <path d="M192 56l32 32-32 32" opacity="0.84"/>
    <path d="M12 138h266M96 166h98" opacity="0.65"/>
    <circle cx="306" cy="24" r="16" fill="none" opacity="0.82"/>
    <path d="M306 40v42M284 62h44M292 96h28M276 126h60" opacity="0.65"/>
    <path d="M24 24v-20h70M260 24v-20h-70M24 132v34h70M260 132v34h-70" opacity="0.45"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0">
    <rect x="710" y="247" width="86" height="30" rx="15" fill="#00A896" fill-opacity="0.88"/>
    <text x="735" y="268" fill="#08201E">React</text>
    <rect x="808" y="247" width="94" height="30" rx="15" fill="#F2C14E" fill-opacity="0.9"/>
    <text x="830" y="268" fill="#231B0A">Laravel</text>
    <rect x="914" y="247" width="84" height="30" rx="15" fill="#E56B6F" fill-opacity="0.9"/>
    <text x="939" y="268" fill="#2A0C0E">KiCad</text>
  </g>
